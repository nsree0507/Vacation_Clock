  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <circle class="face" cx="90" cy="90" r="58" />
  <g class="hands" stroke-width="13" stroke-linecap="round">
    <line x1="90" y1="90" x2="90" y2="52" />
    <line x1="90" y1="90" x2="118" y2="104" />
  </g>
  <circle class="hands" cx="90" cy="90" r="9" />
